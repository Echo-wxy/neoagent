# SFT recipe (paper: Training). Mirror these in scripts/4_train_sft.py flags.
model: meta-llama/Meta-Llama-3-8B
data: data/trajectories.jsonl          # 15k demonstration trajectories
output_dir: checkpoints/neoagent-llama3-8b
deepspeed: configs/deepspeed_zero3.json

effective_batch_size: 128
per_device_batch_size: 1               # x num_gpus x grad_accum -> 128
epochs: 3
optimizer: adamw_torch
learning_rate: 3.0e-5
lr_scheduler: constant_with_warmup
warmup_steps: 50
max_length: 32768                      # context length cap
precision: bf16
gradient_checkpointing: true
reinforcement_learning: false          # NeoAgent uses SFT only
# Reference compute: 8x A100 80GB, ~480 GPU-hours for 3 epochs on 15k trajectories.
